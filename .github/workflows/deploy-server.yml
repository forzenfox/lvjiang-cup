name: Deploy to Server

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '部署版本 (例如：latest, v1.0.0)'
        required: false
        default: 'latest'
        type: string
      environment:
        description: '部署环境 (production/staging)'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://cup.example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "Host *" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
          echo "  UserKnownHostsFile /dev/null" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy to server
        run: |
          TAG="${{ github.event.inputs.tag || 'latest' }}"
          echo "🚀 开始部署到 ${{ github.event.inputs.environment || 'production' }} 环境"
          echo "版本标签：$TAG"
          
          # 通过 SSH 执行远程部署命令
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_SERVER }} << 'EOF'
            set -e
            
            echo "📦 拉取最新镜像..."
            cd /opt/lvjiang-cup/deploy
            docker-compose pull
            
            echo "🎯 重启服务..."
            docker-compose up -d
            
            echo "⏳ 等待服务启动..."
            sleep 8
            
            echo "✅ 验证服务..."
            if docker exec lvjiang-backend wget --quiet --tries=1 --spider http://localhost:3000/api/teams; then
              echo "✅ 后端服务正常"
            else
              echo "❌ 后端服务检查失败"
              exit 1
            fi
            
            if docker exec lvjiang-frontend wget --quiet --tries=1 --spider http://localhost:3000; then
              echo "✅ 前端服务正常"
            else
              echo "❌ 前端服务检查失败"
              exit 1
            fi
            
            echo "🎉 部署完成！"
          EOF

      - name: Notify success
        if: success()
        run: |
          echo "✅ 部署成功！"
          echo "环境：${{ github.event.inputs.environment || 'production' }}"
          echo "版本：${{ github.event.inputs.tag || 'latest' }}"
          echo "访问地址：https://cup.example.com"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ 部署失败！"
          echo "请检查日志或联系管理员"
