name: Build Frontend Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签 (例如：latest, v1.0.0)'
        required: false
        default: 'latest'
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ inputs.tag || 'latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Output frontend image info
        run: |
          echo "✅ 前端镜像构建完成"
          echo "前端镜像：${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ inputs.tag || 'latest' }}"

  summary:
    runs-on: ubuntu-latest
    needs: [build-frontend]
    steps:
      - name: Output deployment info
        run: |
          echo "✅ 前端 Docker 镜像构建完成"
          echo ""
          echo "📦 镜像信息："
          echo "- 前端：${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ inputs.tag || 'latest' }}"
          echo ""
          echo "📌 部署说明："
          echo "1. 拉取镜像：docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ inputs.tag || 'latest' }}"
          echo "2. 部署到服务器：参考 deploy/README.md"
