version: '3.8'

services:
  backend:
    build: .
    container_name: lvjiang-cup-backend
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-here}
      - JWT_EXPIRES_IN=24h
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - DATABASE_PATH=/app/data/lvjiang.db
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/teams"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
